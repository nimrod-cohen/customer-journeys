name: deploy

# Fast production deploys: on every push to main, build the image on a NATIVE
# amd64 runner (no local qemu cross-build), push to ECR with layer caching, and
# trigger the App Runner web + worker services to roll to the new image.
#
# Auth is via GitHub OIDC → the IAM role cdp-github-deploy (no long-lived secrets).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_IMAGE: 081348549944.dkr.ecr.eu-central-1.amazonaws.com/cdp-app:latest

jobs:
  build-deploy:
    runs-on: ubuntu-latest # native amd64 — App Runner's architecture
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::081348549944:role/cdp-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          provenance: false # clean single-arch manifest (App Runner rejects OCI indexes)
          push: true
          tags: ${{ env.ECR_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger App Runner deployment(s)
        run: |
          set -euo pipefail
          for name in cdp-web cdp-worker; do
            arn=$(aws apprunner list-services --region "$AWS_REGION" \
              --query "ServiceSummaryList[?ServiceName=='$name'].ServiceArn | [0]" --output text)
            if [ -n "$arn" ] && [ "$arn" != "None" ]; then
              echo "Deploying $name ($arn)"
              aws apprunner start-deployment --service-arn "$arn" --region "$AWS_REGION"
            else
              echo "Service $name not found — skipping"
            fi
          done
