name: deploy

# Production deploys to Fly.io. On push to main, flyctl builds the image on Fly's
# remote builders (native amd64, no local qemu) and rolls out the web + worker
# process groups defined in fly.toml. Auth via the FLY_API_TOKEN repo secret.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
